services:
  valkey:
    image: valkey/valkey
    ports:
      - 6379:6379
    volumes:
      - valkey_data:/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: .
    command: node index.js
    ports:
      - 7000:7000
    depends_on:
      - valkey
      - qdrant
    environment:
      - PORT=7000
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ACCOUNTID=${CLOUDFLARE_ACCOUNTID}
    volumes:
      - ./uploads:/app/uploads

  worker:
    build: .
    command: node worker.js
    depends_on:
      - valkey
      - qdrant
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN} # I actually dont know are both needed here? but that is fine
      - CLOUDFLARE_ACCOUNTID=${CLOUDFLARE_ACCOUNTID} 
    volumes:
      - ./uploads:/app/uploads

volumes:
  valkey_data:
  qdrant_storage: